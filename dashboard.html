<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Karwińska Olimpiada - Dashboard">
    <link rel="shortcut icon" href="/img/logos/icon.png" type="image/x-icon">
    <title> Olimpiada Karwińska - Dashboard</title>

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
</head>

<body>

    <div class="loader-global" id="loader-global">
        <div class="loader_spinner"></div>
    </div>

    <main class="main">

        <div class="dashboard">

            <nav class="dashboard_navbar">

                <div class="selector">
                    <ul>
                        <li class="active" id="selector-account"> <img src="/img/dashboard/profile_icon.webp"> Moje konto </li>
                        <li id="selector-tournaments"> <img src="/img/dashboard/trophy_icon.webp"> Turnieje </li>
                        <li id="selector-calendar"> <img src="/img/dashboard/calendar_icon.webp"> Kalendarz </li>
                    </ul>
                </div>

                <div class="user_card_container">
                    <div class="user_card">

                        <div class="picture">
                            <img src="img/default_pfp.webp" id="player_pfp">
                        </div>

                        <div class="details">
                            <a href="/players" id="player_link">
                                <div class="details_container">
                                    <h3>
                                        <div class="name" id="player_name"></div>
                                    </h3>
                                    
                                    <div class="role_container">
                                        <h5><div class="role_badge" id="player_role"></div></h5>
                                    </div>
                                </div>
                            </a>
                        </div>

                        <div class="more_icon">
                            <button class="more_button" onclick="toggleUserActionsCard()">
                            <svg fill="currentColor" width="2rem" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="17.5" cy="12" r="1.5"/>
                                <circle cx="12" cy="12" r="1.5"/>
                                <circle cx="6.5" cy="12" r="1.5"/>
                            </svg>
                            </button>

                            <div class="action_menu user_actions" id="user_actions">
                                <ul>
                                    <li>
                                        <button id="logout_btn">
                                            <h4>
                                                <svg width="0.8rem" viewBox="0 0 12 12"><polygon fill="currentColor" points="9,2 9,0 1,0 1,12 9,12 9,10 8,10 8,11 2,11 2,1 8,1 8,2 "/><polygon fill="currentColor" points="8.2929688,3.2929688 7.5859375,4 9.0859375,5.5 5,5.5 5,6.5 9.0859375,6.5 7.5859375,8   8.2929688,8.7070313 11,6 "/></svg> Wyloguj się
                                            </h4>
                                        </button>
                                    </li>
                                </ul>
                            </div>
                        </div>

                    </div>
                </div>

            </nav>

            <div class="content">
                <div class="tab_content tab_content-account" id="content-account"></div>
                <div class="tab_content tab_content-tournaments" id="content-tournaments"></div>
                <div class="tab_content tab_content-calendar" id="content-calendar">
                    <div class="calendar_container">
                        <div class="calendar"></div>
                    </div>
                </div>
            </div>

        </div>

        <div class="confirmation_popup" id="universal_popup">
            <div class="popup_container">
                
                <div class="popup_icon">
                    <img src="/img/dashboard/warning_icon.webp">
                </div>

                <div class="popup_body">
                    <p id="popup_message">Czy na pewno chcesz to zrobić?</p>
                </div>

                <div class="popup_footer">
                    <button class="btn btn_cancel_only_this" id="popup_cancel">Anuluj</button>
                    <button class="btn btn_confirm" id="popup_confirm">Potwierdź</button>
                </div>
            </div>
        </div>

        <div class="popup_overlay" id="error_popup">
            <div class="popup_container">
                <div class="popup_body">
                    <p id="error_message">Wystąpił błąd.</p>
                </div>
                <div class="popup_footer">
                    <button class="btn btn_cancel" id="error_close_btn">Zamknij</button>
                </div>
            </div>
        </div>

        <div class="popup_overlay" id="tournament_events_popup">
            <div class="popup_container popup_large">

                <div class="popup_header">
                    <h2> Wydarzenia </h2>
                </div>

                <div class="events_list">
                    <!-- showTournamentEventsPopup() inserts here -->
                </div>
                
                <div class="popup_footer_row">
                    <button class="btn btn_cancel btn_tertiary" id="editor_cancel_btn">Zamknij</button>
                </div>

            </div>
        </div>

        <div class="popup_overlay" id="tournament_popup">
            <div class="popup_container popup_large">
                
                <div class="popup_header editor_header">
                    <div class="header_row">
                        <label>ID turnieju:</label>
                        <span id="show_tour_id" class="show_tour_id"></span>
                    </div>

                    <div class="header_row">
                        <label>Nazwa turnieju:</label>
                        <input type="text" id="edit_tour_name" class="editor_input header_input">
                    </div>
                    
                    <div class="header_row">
                        <label>Wyświetlana data:</label>
                        <input type="text" id="edit_display_date" class="editor_input header_input">
                    </div>

                    <div class="header_row">
                        <label>Koniec (Timestamp):</label>
                        <input type="number" id="edit_timestamp" class="editor_input header_input">
                    </div>
                    
                    <div class="header_row">
                        <label>Zakończony:</label>
                        <input type="checkbox" id="edit_finished" class="header_checkbox">
                    </div>

                    <div class="header_row tier_row">
                        <label>Tier:</label>
                        <select id="edit_tier" class="editor_input select_input">
                            <option value="S">S</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select>
                        <button class="btn btn_secondary small_btn" id="edit_tier_btn">Zmień tier</button>
                    </div>
                </div>

                <div class="popup_body popup_scrollable">

                    <div class="add_player_form">
                        <input type="text" id="add_player_id" class="editor_input text_input" placeholder="Wpisz ID gracza...">
                        <button class="btn btn_secondary" id="add_player_btn">Dodaj</button>
                    </div>

                    <div class="editor_container">
                        <table class="editor_table">
                            <thead>
                                <tr>
                                    <th>Gracz</th>
                                    <th>Pozycja</th>
                                    <th>Punkty</th>
                                    <th>Akcja</th>
                                </tr>
                            </thead>
                            <tbody id="editor_players_list">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="popup_footer">

                    <div class="popup_footer_row">
                        <button class="btn btn_delete" id="editor_delete_btn" style="display: none;">Usuń turniej</button>
                    </div>
                    
                    <div class="popup_footer_row">
                        <button class="btn btn_cancel btn_tertiary" id="editor_cancel_btn">Anuluj</button>
                        <button class="btn btn_primary" id="editor_save_btn">Zapisz</button>
                    </div>
                
                </div>

            </div>
        </div>

        <div class="popup_overlay universal_event_popup" id="universal_event_popup" >
            <div class="popup_content">
                <div id="popup_header" class="popup_title">Szczegóły Wydarzenia</div>
                
                <div class="popup_body">
                    <div id="event_view_mode">
                        <p><span class="p_title">Turniej:</span> <span id="view_event_tournament"></span></p>
                        <p><span class="p_title">Typ:</span> <span id="view_event_type"></span></p>
                        <p><span class="p_title">Początek:</span> <span id="view_event_start"></span></p>
                        <p><span class="p_title">Koniec:</span> <span id="view_event_end"></span></p>
                    </div>

                    <form autocomplete="off" id="event_edit_mode" style="display: none;">
                        <label>Nazwa Wydarzenia:</label>
                        <input type="text" id="edit_event_name" class="popup_input">
                        
                        <label>ID Turnieju:</label>
                        <select id="edit_event_tournament" class="popup_input"></select>
                        
                        <label>Ważność:</label>
                        <select id="edit_event_major" class="popup_input">
                            <option value="false">Małe wydarzenie</option>
                            <option value="true">Duże wydarzenie</option>
                        </select>

                        <label>Początek:</label>
                        <input type="datetime-local" id="edit_event_start" class="popup_input">
                        
                        <label>Koniec:</label>
                        <input type="datetime-local" id="edit_event_end" class="popup_input">
                    </form>
                </div>

                <div class="popup_footer">
                    <button id="btn_popup_cancel" class="btn_cancel btn_tertiary">Anuluj</button>
                    <button id="btn_popup_delete" class="btn_delete" style="display: none;">Usuń</button>
                    <button id="btn_popup_save" class="btn_primary" style="display: none;">Zapisz</button>
                </div>
            </div>
        </div>

    </main>


    <footer class="footer" id="footer">
        <div id="common-footer"></div>
    </footer>

    <script type="module" src="/js/dashboard.js"></script>

    <!-- footer.html and footer.js loading script -->
    <script src="/js/footer-loader.js"></script>


</body>
